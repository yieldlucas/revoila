[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
# E501 (longueur de ligne) géré par le formateur, pas bloquant ici.
ignore = ["E501"]

[tool.ruff.lint.flake8-bugbear]
# Les helpers FastAPI sont conçus pour être appelés dans les défauts d'arguments.
extend-immutable-calls = ["fastapi.Query", "fastapi.Form", "fastapi.Path", "fastapi.Depends"]
